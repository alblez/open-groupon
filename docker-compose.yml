version: '2'

services:
    web:
        build: .
        ports:
            - "8080:80"
        volumes:
            - .:/var/www/html
        environment:
            - SYMFONY_ENV=dev
        depends_on:
            - db

    db:
        image: mysql:5.7
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: cupon
            MYSQL_USER: cupon
            MYSQL_PASSWORD: cupon
        ports:
            - "3306:3306"
        volumes:
            - db_data:/var/lib/mysql

volumes:
    db_data:
