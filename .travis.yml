language: php

sudo: false

cache:
    directories:
        - $HOME/.composer/cache

php:
    - 5.6
    - 7.0
    - nightly

matrix:
    allow_failures:
        - php: nightly
    fast_finish: true

before_install:
    - composer self-update

install:
    - composer install --no-interaction --prefer-dist

script:
    - phpunit -c app
